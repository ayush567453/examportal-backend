# ═══════════════════════════════════════════════════════
#  PRODUCTION CONFIG — Railway auto-injects these vars
#  Do NOT commit real secrets — set them in Railway dashboard
# ═══════════════════════════════════════════════════════

# Railway sets PORT automatically
server.port=${PORT:10101}

# Railway MySQL — set these in Railway dashboard as env vars
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Email — set in Railway dashboard
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File storage — Railway temp storage
tenant.logo.path=/tmp/uploads/logos
proctoring.storage.path=/tmp/uploads/proctoring

# API Keys — set in Railway dashboard
huggingface.api.key=${HUGGINGFACE_API_KEY}
razorpay.api.key=${RAZORPAY_KEY}
razorpay.api.secret=${RAZORPAY_SECRET}

# OAuth — set in Railway dashboard
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Swagger — disable in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
